name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1 : Lint, typecheck et tests unitaires ────────────────────────────
  # Rapide, pas besoin de base de données
  lint-and-unit:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test
        env:
          JWT_SECRET: test-secret-ci
          NODE_ENV: test

  # ─── Job 2 : Tests d'intégration avec PostgreSQL ──────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eliot
          POSTGRES_PASSWORD: motdepasse
          POSTGRES_DB: projet-final-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Initialize test database schema
        run: psql -f docker/initdb.d/00.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: eliot
          PGPASSWORD: motdepasse
          PGDATABASE: projet-final-test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgres://eliot:motdepasse@localhost:5432/projet-final-test
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
